<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex,nofollow" />
<title>提案スライド — 解の棚</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  /* ===== viewport-fitting base (frontend-slides) ===== */
  html, body { height: 100%; overflow-x: hidden; margin: 0; }
  html { scroll-snap-type: y proximity; scroll-behavior: smooth; }
  .slide { width: 100vw; height: 100vh; height: 100dvh; overflow: hidden; scroll-snap-align: start;
    display: flex; flex-direction: column; position: relative; }
  .slide-content { flex: 1; display: flex; flex-direction: column; justify-content: center;
    max-height: 100%; overflow: hidden; padding: var(--slide-padding); max-width: 1120px; margin: 0 auto; width: 100%; }
  :root {
    --title-size: clamp(1.55rem, 5vw, 3.6rem);
    --h2-size: clamp(1.25rem, 3.4vw, 2.3rem);
    --h3-size: clamp(1rem, 2.3vw, 1.5rem);
    --body-size: clamp(0.9rem, 1.6vw, 1.15rem);
    --small-size: clamp(0.7rem, 1.1vw, 0.9rem);
    --slide-padding: clamp(1.3rem, 4.5vw, 4rem);
    --content-gap: clamp(0.6rem, 2vw, 1.5rem);
    --paper:#f6f2ea; --paper-2:#efe9dd; --surface:#fffdf8; --ink:#1f261d; --muted:#6f685b;
    --line:#e4dccd; --forest:#2f5d4f; --forest-deep:#244b40; --clay:#bf6438; --seg:#3f7d5a;
    --display:"Shippori Mincho", serif;
    --body:"Zen Kaku Gothic New", system-ui, "Noto Sans JP", sans-serif;
  }
  body { font-family: var(--body); color: var(--ink); background: var(--paper); -webkit-font-smoothing: antialiased;
    background-image: radial-gradient(900px 520px at 88% -10%, rgba(191,100,56,.09), transparent 60%),
                      radial-gradient(820px 520px at -8% 8%, rgba(47,93,79,.11), transparent 55%); }
  .slide-content > * { position: relative; z-index: 1; }

  .topbar { position: fixed; top:0; left:0; right:0; height:4px; background: linear-gradient(90deg, var(--forest-deep), var(--clay)); z-index:50; }
  .brandbar { position: fixed; top:16px; left:clamp(16px,4vw,40px); right:clamp(16px,4vw,40px); display:flex; justify-content:space-between; align-items:center; z-index:50; }
  .brandbar .b { font-family: var(--display); font-weight:700; color: var(--forest-deep); font-size:15px; }
  .brandbar a { color: var(--muted); font-size:12.5px; text-decoration:none; font-weight:700; letter-spacing:.03em;
    background: var(--surface); border:1px solid var(--line); padding:6px 13px; border-radius:999px; }
  .brandbar a:hover { color: var(--ink); border-color: var(--forest); }

  .kicker { font-size: var(--small-size); letter-spacing:.32em; text-transform: uppercase; color: var(--clay); font-weight:700; margin:0 0 clamp(.5rem,1.5vw,1rem); }
  .seg-tag { align-self:flex-start; font-size: var(--small-size); font-weight:700; letter-spacing:.06em; color:#fff; background: var(--seg); padding:4px 14px; border-radius:999px; margin-bottom: clamp(.6rem,2vw,1.3rem); }
  h1.t { font-family: var(--display); font-weight:700; font-size: var(--title-size); line-height:1.18; color: var(--forest-deep); margin:0 0 clamp(.6rem,2vw,1.1rem); }
  h2.t { font-family: var(--display); font-weight:600; font-size: var(--h2-size); line-height:1.25; color: var(--ink); margin:0 0 clamp(.7rem,2vw,1.3rem); }
  .lead { font-size: var(--h3-size); color: var(--muted); line-height:1.6; max-width:40ch; }

  ul.list { list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap: clamp(.4rem,1.4vh,.95rem); }
  ul.list li { font-size: var(--body-size); line-height:1.45; display:flex; gap:.6em; align-items:flex-start; }
  ul.list li .mk { flex:0 0 auto; font-weight:700; }
  ul.merit li .mk { color: var(--forest); } ul.demerit li .mk { color: var(--clay); } ul.feat li .mk { color: var(--forest-deep); }

  /* 図解 */
  .dgm { width:100%; height:auto; max-height: clamp(170px, 40vh, 380px); display:block; }
  .dgm text { font-family: var(--body); }
  .twocol { display:grid; grid-template-columns: 1.1fr .9fr; gap: clamp(1rem,3vw,2.5rem); align-items:center; }
  @media (max-width:760px){ .twocol{ grid-template-columns:1fr; gap:1rem; } .dgm{ max-height:32vh; } }
  .caption { font-family: var(--display); font-size: var(--h3-size); color: var(--ink); margin: clamp(.6rem,2vw,1.2rem) 0 0; text-align:center; }

  /* ===== 業種モチーフ背景（segごとに淡いグリフ） ===== */
  .slide .motif { position:absolute; inset:0; overflow:hidden; pointer-events:none; z-index:0; }
  .slide .motif svg { position:absolute; opacity:.05; color: var(--seg); }
  .slide .motif .m-a { right:-4%; top:-6%; width:clamp(220px,34vw,440px); transform: rotate(-8deg); }
  .slide .motif .m-b { left:-5%; bottom:-10%; width:clamp(180px,26vw,340px); transform: rotate(10deg); opacity:.038; }

  /* ===== delight: 入場アニメ（.slide.in で発火） ===== */
  /* 線が描かれる */
  .dgm .draw { stroke-dasharray: var(--len, 400); stroke-dashoffset: var(--len, 400); }
  .slide.in .dgm .draw { animation: dgm-draw .9s cubic-bezier(.4,0,.2,1) forwards; animation-delay: var(--ddelay, .25s); }
  @keyframes dgm-draw { to { stroke-dashoffset: 0; } }
  /* ノードがポップ */
  .dgm .pop { opacity:0; transform-box: fill-box; transform-origin: center; transform: scale(.6); }
  .slide.in .dgm .pop { animation: dgm-pop .5s cubic-bezier(.34,1.56,.64,1) forwards; animation-delay: var(--pdelay, .1s); }
  @keyframes dgm-pop { 0%{opacity:0; transform:scale(.6);} 100%{opacity:1; transform:scale(1);} }
  /* 主役アイコンがふわっと浮く（入場後ループ・控えめ） */
  .dgm .float { transform-box: fill-box; transform-origin: center; }
  .slide.in .dgm .float { animation: dgm-float 4.5s ease-in-out 1s infinite; }
  /* pop と float の両方を持つノードは、float が pop を上書きして opacity:0 のまま消える。
     両アニメを明示的に併記して救済（pop で opacity を 1 にしてから float で浮かせる）。 */
  .slide.in .dgm .pop.float { animation: dgm-pop .5s var(--pdelay,.1s) cubic-bezier(.34,1.56,.64,1) forwards, dgm-float 4.5s 1s ease-in-out infinite; }
  @keyframes dgm-float { 0%,100%{ transform: translateY(0);} 50%{ transform: translateY(-5px);} }
  /* フェードイン（テキスト等） */
  .dgm .fade { opacity:0; }
  .slide.in .dgm .fade { animation: dgm-fade .55s ease forwards; animation-delay: var(--fdelay, .35s); }
  @keyframes dgm-fade { to { opacity:1; } }

  /* 数字バッジのポップ */
  .badge { opacity:0; transform: translateY(10px) scale(.96); }
  .slide.in .badge { animation: badge-pop .55s cubic-bezier(.34,1.56,.64,1) forwards; }
  .slide.in .badge:nth-child(2){ animation-delay:.1s } .slide.in .badge:nth-child(3){ animation-delay:.2s }
  @keyframes badge-pop { to { opacity:1; transform: none; } }
  .badge .big.count { font-variant-numeric: tabular-nums; }
  .badge .big .accent { color: var(--seg); }

  /* ステップの順次入場 */
  .step { opacity:0; transform: translateX(-8px); }
  .slide.in .step { animation: step-in .5s ease forwards; }
  .slide.in .step:nth-child(2){animation-delay:.12s} .slide.in .step:nth-child(3){animation-delay:.24s}
  .slide.in .step:nth-child(4){animation-delay:.36s} .slide.in .step:nth-child(5){animation-delay:.48s}
  @keyframes step-in { to { opacity:1; transform:none; } }

  .badges { display:flex; gap: clamp(.6rem,2vw,1.4rem); flex-wrap:wrap; }
  .badge { background: var(--surface); border:1px solid var(--line); border-radius:16px; padding: clamp(.9rem,2.4vw,1.6rem) clamp(1rem,2.6vw,1.8rem); flex:1; min-width:150px; }
  .badge .big { font-family: var(--display); font-weight:700; color: var(--forest-deep); font-size: clamp(1.3rem,3.2vw,2.2rem); line-height:1.1; }
  .badge .lab { color: var(--muted); font-size: var(--small-size); margin-top:.4em; }

  .price-box { background: var(--forest-deep); color:#fff; border-radius:18px; padding: clamp(1.1rem,3vw,2rem); }
  .price-box .p { font-family: var(--display); font-weight:700; font-size: var(--h3-size); line-height:1.4; }
  .value-line { font-size: var(--body-size); color: var(--ink); line-height:1.6; background: linear-gradient(180deg,transparent 64%, rgba(63,125,90,.20) 0); display:inline; }

  .steps { display:flex; gap:.5rem; align-items:stretch; flex-wrap:wrap; }
  .step { flex:1; min-width:160px; background: var(--surface); border:1px solid var(--line); border-radius:14px; padding: clamp(.8rem,2vw,1.3rem); position:relative; }
  .step .n { font-family: var(--display); font-weight:700; color: var(--clay); font-size: clamp(1.1rem,2.6vw,1.6rem); }
  .step .x { font-size: var(--body-size); margin-top:.3em; line-height:1.4; }
  .step:not(:last-child)::after { content:"›"; position:absolute; right:-.55rem; top:50%; transform:translateY(-50%); color: var(--clay); font-weight:700; font-size:1.4rem; z-index:2; }
  @media (max-width:760px){ .step:not(:last-child)::after{ content:"▾"; right:auto; left:50%; top:auto; bottom:-.9rem; transform:translateX(-50%); } }

  .cta { display:inline-flex; align-items:center; gap:.5em; font-family:var(--body); font-weight:700; font-size:var(--body-size);
    border:none; cursor:pointer; background: var(--clay); color:#fff; padding:.8em 1.6em; border-radius:999px; text-decoration:none; }
  .cta:hover{ background:#a8542c; } .cta.ghost{ background:var(--surface); color:var(--forest-deep); border:1px solid var(--line); } .cta.ghost:hover{ border-color:var(--forest); }
  .cta-row { display:flex; gap:.8rem; flex-wrap:wrap; margin-top: clamp(1rem,3vw,1.8rem); }
  .reassure { color: var(--muted); font-size: var(--small-size); margin-top: clamp(.8rem,2vw,1.2rem); }

  .slide-content .rv { opacity:0; transform: translateY(16px); transition: opacity .5s ease, transform .5s ease; }
  .slide.in .rv { opacity:1; transform:none; }
  .slide.in .rv:nth-child(2){transition-delay:.06s} .slide.in .rv:nth-child(3){transition-delay:.12s}
  .slide.in .rv:nth-child(4){transition-delay:.18s} .slide.in .rv:nth-child(5){transition-delay:.24s}

  .dots { position: fixed; right: clamp(10px,2vw,22px); top:50%; transform:translateY(-50%); display:flex; flex-direction:column; gap:9px; z-index:50; }
  .dots button { width:9px; height:9px; border-radius:50%; border:1px solid var(--forest); background:transparent; cursor:pointer; padding:0; }
  .dots button[aria-current="true"]{ background: var(--forest-deep); border-color: var(--forest-deep); transform:scale(1.25); }
  .counter { position: fixed; left: clamp(16px,4vw,40px); bottom:16px; font-size: var(--small-size); color: var(--muted); z-index:50; }
  .hint { position: fixed; right: clamp(16px,4vw,40px); bottom:16px; font-size: var(--small-size); color: var(--muted); z-index:50; }

  @media (max-height:700px){ :root{ --slide-padding:clamp(1rem,3.2vw,2rem); --title-size:clamp(1.35rem,4.4vw,2.4rem); --h2-size:clamp(1.05rem,3vw,1.7rem); } .dgm{ max-height:34vh; } }
  @media (max-height:600px){ .dots,.hint{ display:none } .dgm{ max-height:30vh; } }
  @media (max-width:600px){ :root{ --title-size:clamp(1.35rem,7vw,2.4rem); } .brandbar .b{ font-size:13px } .badges{ gap:.5rem } }
  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{ animation:none!important; transition-duration:.2s!important }
    html{ scroll-behavior:auto }
    .slide-content .rv{ opacity:1; transform:none }
    .dgm .draw{ stroke-dashoffset:0!important } .dgm .pop,.dgm .fade{ opacity:1!important; transform:none!important }
    .badge,.step{ opacity:1!important; transform:none!important }
  }
</style>
</head>
<body>
  <div class="topbar"></div>
  <div class="brandbar"><span class="b" id="brand">解の棚</span><a href="index.html" id="back">← 解の棚にもどる</a></div>
  <main id="deck"></main>
  <nav class="dots" id="dots" aria-label="スライド"></nav>
  <div class="counter" id="counter"></div>
  <div class="hint">↑ ↓ / クリックで移動</div>

  <script src="packages.js"></script>
  <script>
    const SEG_HUE = { "農業":"#3f7d5a", "B型・A型":"#3a6ea5", "飲食":"#bf6438", "小売":"#876aae" };
    const esc=(s)=>String(s==null?"":s).replace(/[&<>"]/g,(m)=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));
    const params = new URLSearchParams(location.search);
    const p = (window.PACKAGES||[]).find(x=>x.id===params.get("id")) || (window.PACKAGES||[])[0];
    const SANS = "'Zen Kaku Gothic New', sans-serif";
    const MIN = "'Shippori Mincho', serif";

    // ===== 配色 =====
    const SEG = SEG_HUE[p.segment] || "#3f7d5a";
    const C = { paper:"#fffdf8", paperSoft:"#f3eee4", line:"#e4dccd", ink:"#1f261d", muted:"#6f685b",
                forest:"#2f5d4f", deep:"#244b40", clay:"#bf6438", thread:"#cdbb9d" };

    // ===== SVGアイコン（シンプルなパス。strokeはcurrentColor想定） =====
    // すべて 0 0 24 24 のローカル座標。<g transform> で配置する。
    const ICON = {
      leaf:  `<path d="M21 3C9 3 4 9 4 18c0 1 0 2 .5 3 0-7 5-11 12-12-5 2-8 5-9 11 7 1 13-3 13-12 0-2 0-4 .5-5z"/>`,
      box:   `<path d="M3 7.5 12 3l9 4.5v9L12 21l-9-4.5z"/><path d="M3 7.5 12 12l9-4.5M12 12v9"/>`,
      phone: `<rect x="6" y="2.5" width="12" height="19" rx="2.5"/><line x1="10" y1="18.5" x2="14" y2="18.5"/>`,
      bars:  `<line x1="3" y1="21" x2="21" y2="21"/><rect x="5" y="12" width="3" height="9"/><rect x="10.5" y="7" width="3" height="14"/><rect x="16" y="14" width="3" height="7"/>`,
      plate: `<circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4.5"/>`,
      person:`<circle cx="12" cy="7.5" r="3.6"/><path d="M5 21c0-4 3.2-6.5 7-6.5s7 2.5 7 6.5"/>`,
      cal:   `<rect x="3.5" y="5" width="17" height="15" rx="2"/><line x1="3.5" y1="9.5" x2="20.5" y2="9.5"/><line x1="8" y1="2.5" x2="8" y2="6.5"/><line x1="16" y1="2.5" x2="16" y2="6.5"/>`,
      note:  `<path d="M6 3h9l4 4v14H6z"/><line x1="9" y1="11" x2="16" y2="11"/><line x1="9" y1="15" x2="16" y2="15"/>`,
      chat:  `<path d="M4 5h16v11H9l-4 4v-4H4z"/>`,
      grid:  `<rect x="3.5" y="3.5" width="7" height="7" rx="1"/><rect x="13.5" y="3.5" width="7" height="7" rx="1"/><rect x="3.5" y="13.5" width="7" height="7" rx="1"/><rect x="13.5" y="13.5" width="7" height="7" rx="1"/>`,
      check: `<path d="M5 13l4 4 10-11"/>`,
      cart:  `<circle cx="9" cy="20" r="1.4"/><circle cx="17" cy="20" r="1.4"/><path d="M2.5 3.5h2.5l2.2 11h10l2-8H6.5"/>`,
      sun:   `<circle cx="12" cy="12" r="4"/><g><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/><line x1="5" y1="5" x2="7" y2="7"/><line x1="17" y1="17" x2="19" y2="19"/><line x1="19" y1="5" x2="17" y2="7"/><line x1="7" y1="17" x2="5" y2="19"/></g>`,
      hub:   `<circle cx="12" cy="12" r="3"/><circle cx="12" cy="4" r="1.6"/><circle cx="20" cy="12" r="1.6"/><circle cx="4" cy="12" r="1.6"/><circle cx="12" cy="20" r="1.6"/><line x1="12" y1="9" x2="12" y2="5.6"/><line x1="15" y1="12" x2="18.4" y2="12"/><line x1="9" y1="12" x2="5.6" y2="12"/><line x1="12" y1="15" x2="12" y2="18.4"/>`,
    };
    // アイコンを配置: name, x, y(中心), size, color, opts{stroke,fill,cls,sw}
    function icon(name, x, y, size, color, opts){
      opts=opts||{}; const s=size/24; const sw=(opts.sw||1.8)/s;
      const fill = opts.fill || "none"; const stroke = opts.stroke===false?"none":(color||"currentColor");
      return `<g transform="translate(${x-size/2},${y-size/2}) scale(${s})" class="${opts.cls||""}"
        fill="${fill}" stroke="${stroke}" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round"
        style="color:${color||"currentColor"}">${ICON[name]||""}</g>`;
    }

    // ===== 共通パーツ =====
    function txt(x,y,s,fill,t,opts){ opts=opts||{};
      return `<text x="${x}" y="${y}" text-anchor="${opts.anchor||"middle"}" font-size="${s}" fill="${fill}" ${opts.weight?`font-weight="${opts.weight}"`:""} ${opts.family?`font-family="${opts.family}"`:""} ${opts.cls?`class="${opts.cls}"`:""} style="${opts.fdelay?`--fdelay:${opts.fdelay}s;`:""}">${esc(t)}</text>`;
    }
    // 描画される線（長さ概算で dasharray を設定）
    function drawLine(x1,y1,x2,y2,color,sw,delay){
      const len=Math.round(Math.hypot(x2-x1,y2-y1))+6;
      return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${color}" stroke-width="${sw||2.5}" class="draw" style="--len:${len};--ddelay:${delay||.25}s" marker-end="url(#ah)"/>`;
    }
    function svgDefs(){
      return `<defs>
        <marker id="ah" markerWidth="9" markerHeight="9" refX="6.5" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="${C.thread}"/></marker>
        <marker id="ahs" markerWidth="9" markerHeight="9" refX="6.5" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="${SEG}"/></marker>
      </defs>`;
    }
    // ふせん風チップ（左の散らばった道具に使う）
    function chip(x,y,w,t,iconName,popDelay){
      const h=42, ix=x+20;
      return `<g class="pop" style="--pdelay:${popDelay}s">
        <rect x="${x}" y="${y-h/2}" width="${w}" height="${h}" rx="10" fill="${C.paper}" stroke="${C.line}"/>
        ${iconName?icon(iconName, ix, y, 20, C.muted, {sw:1.7}):""}
        <text x="${x+(iconName?34:14)}" y="${y+6}" font-size="17" fill="${C.ink}" text-anchor="start">${esc(t)}</text>
      </g>`;
    }

    // ===== 業種特化のお悩み図（id → テーマ） =====
    // 各図は viewBox 0 0 860 360 を使う
    function painPlatform(){ // agri-tania-platform: 複数農家からバラバラ
      const farms=[70,170,270].map((y,i)=>`
        <g class="pop float" style="--pdelay:${.15+i*.12}s">
          <circle cx="86" cy="${y}" r="30" fill="${C.paperSoft}" stroke="${SEG}" stroke-width="2"/>
          ${icon("leaf",86,y,30,SEG,{sw:1.7})}
        </g>
        ${txt(86,y+46,13,C.muted,"農家"+(i+1))}`).join("");
      const notes=[["紙",260,60,"note"],["LINE",250,300,"chat"],["電話",470,40,"phone"]].map(([t,x,y,ic],i)=>
        `${drawLine(120,[70,170,270][i],x-2,y+22,C.thread,2,.3+i*.1)}${chip(x,y,118,t,ic,.4+i*.1)}`).join("");
      return `<svg class="dgm" viewBox="0 0 860 360" role="img" aria-label="複数の農家から在庫や出荷の情報が紙・LINE・電話でバラバラに飛び交い、とりまとめ役が混乱している図">
        ${svgDefs()}${farms}${notes}
        ${drawLine(380,170,540,150,C.clay,2.5,.7)}
        <g class="pop" style="--pdelay:.8s">
          <circle cx="640" cy="170" r="64" fill="${C.clay}"/>
          ${icon("person",640,156,42,"#fff",{sw:1.8})}
        </g>
        ${txt(640,232,17,C.ink,"とりまとめ役",{family:MIN,weight:700,cls:"fade",fdelay:1})}
        ${txt(640,254,13,C.clay,"在庫不明・出荷ズレ…",{cls:"fade",fdelay:1.1})}
        <g class="pop" style="--pdelay:1.05s"><circle cx="690" cy="120" r="17" fill="${C.clay}"/>${txt(690,128,22,"#fff","!",{weight:700})}</g>
      </svg>`;
    }
    function painFarm(){ // agri-tania-farm: 1軒、記録が散在

    slidesEl.forEach((_,i)=>{ const b=document.createElement("button"); b.setAttribute("aria-label",`スライド ${i+1}`); b.onclick=()=>goTo(i); dotsEl.appendChild(b); });
    function setActive(i){ cur=i; Array.from(dotsEl.children).forEach((d,j)=>d.setAttribute("aria-current",j===i)); counter.textContent=`${i+1} / ${slidesEl.length}`; }
    function goTo(i){ if(i<0||i>=slidesEl.length) return; slidesEl[i].scrollIntoView({behavior:"smooth"}); }
    // 数字バッジのカウントアップ（スライド入場時に1回だけ）
    const reduceMotion = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    function countUp(scope){
      scope.querySelectorAll(".count:not(.done)").forEach(el=>{
        el.classList.add("done");
        const to=parseInt(el.getAttribute("data-to"),10)||0; const sign=el.getAttribute("data-sign")||""; const rest=el.getAttribute("data-rest")||"";
        if(reduceMotion){ el.textContent=`${sign}${to}${rest}`; return; }
        const dur=800; const t0=performance.now();
        (function tick(now){ const k=Math.min(1,(now-t0)/dur); const v=Math.round((1-Math.pow(1-k,3))*to);
          el.textContent=`${sign}${v}${rest}`; if(k<1) requestAnimationFrame(tick); })(t0);
      });
    }
    const io=new IntersectionObserver((es)=>{ es.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add("in"); setActive(slidesEl.indexOf(e.target)); setTimeout(()=>countUp(e.target),120); } }); }, {threshold:0.55});
    slidesEl.forEach(s=>io.observe(s)); setActive(0); slidesEl[0].classList.add("in"); countUp(slidesEl[0]);

    const sParam=parseInt(params.get("s"),10);
    if(!isNaN(sParam)&&sParam>=1&&sParam<=slidesEl.length){ const t=slidesEl[sParam-1];
      const jump=()=>{ t.classList.add("in"); window.scrollTo(0,t.offsetTop); countUp(t); }; jump();
      if(document.fonts&&document.fonts.ready) document.fonts.ready.then(()=>setTimeout(jump,30));
      window.addEventListener("load",()=>setTimeout(jump,80));
    }
    document.addEventListener("keydown",(e)=>{
      if(["ArrowDown","ArrowRight","PageDown"," "].includes(e.key)){ e.preventDefault(); goTo(cur+1); }
      if(["ArrowUp","ArrowLeft","PageUp"].includes(e.key)){ e.preventDefault(); goTo(cur-1); }
      if(e.key==="Home") goTo(0); if(e.key==="End") goTo(slidesEl.length-1);
    });
    document.addEventListener("click",(e)=>{ if(e.target.closest("a,button")) return; goTo(cur+1); });
    let ty=null; document.addEventListener("touchstart",(e)=>{ty=e.touches[0].clientY;},{passive:true});
    document.addEventListener("touchend",(e)=>{ if(ty===null)return; const dy=e.changedTouches[0].clientY-ty; if(Math.abs(dy)>50) goTo(cur+(dy<0?1:-1)); ty=null; });
  </script>
</body>
</html>
