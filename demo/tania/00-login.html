<!DOCTYPE html>
<html lang="ja"><head>
<meta charset="UTF-8"><title>Tania - Login</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f7fa; color: #333; }
.header { background: #2e7d32; color: white; padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; height: 60px; }
.header h1 { font-size: 20px; font-weight: 700; }
.farm-badge { background: rgba(255,255,255,0.2); padding: 4px 12px; border-radius: 20px; font-size: 13px; margin-left: 8px; }
.sidebar { position: fixed; left: 0; top: 60px; bottom: 0; width: 220px; background: #1b5e20; padding: 20px 0; overflow-y: auto; }
.sidebar-item { padding: 12px 24px; color: rgba(255,255,255,0.8); font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
.sidebar-item:hover, .sidebar-item.active { background: rgba(255,255,255,0.15); color: white; }
.sidebar-item.active { border-left: 3px solid #a5d6a7; }
.main { margin-left: 220px; padding: 28px 36px; min-height: calc(100vh - 60px); }
.page-title { font-size: 26px; font-weight: 700; color: #1b5e20; }
.page-subtitle { color: #777; font-size: 14px; margin-top: 4px; margin-bottom: 24px; }
.kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
.kpi-card { background: white; border-radius: 12px; padding: 20px 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
.kpi-icon { font-size: 24px; margin-bottom: 8px; }
.kpi-label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.kpi-value { font-size: 36px; font-weight: 800; color: #2e7d32; line-height: 1; }
.kpi-sub { font-size: 12px; color: #aaa; margin-top: 6px; }
.card { background: white; border-radius: 12px; padding: 22px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); margin-bottom: 20px; }
.card-title { font-size: 16px; font-weight: 700; color: #1b5e20; border-bottom: 2px solid #e8f5e9; padding-bottom: 10px; margin-bottom: 16px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { background: #f9fbe7; padding: 10px 14px; text-align: left; font-weight: 600; color: #666; font-size: 11px; text-transform: uppercase; letter-spacing: 0.4px; }
td { padding: 11px 14px; border-bottom: 1px solid #f0f0f0; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #f9fbe7; }
.badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
.badge.active, .badge.ACTIVE { background: #e8f5e9; color: #2e7d32; }
.badge.pending, .badge.PENDING { background: #fff3e0; color: #e65100; }
.badge.URGENT { background: #ffebee; color: #c62828; }
.badge.NORMAL { background: #e3f2fd; color: #1565c0; }
.badge.SEEDING { background: #f3e5f5; color: #6a1b9a; }
.badge.GROWING { background: #e8f5e9; color: #1b5e20; }
.badge.organic { background: #e8f5e9; color: #2e7d32; }
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
.info-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
.info-item { background: #f5f5f5; border-radius: 6px; padding: 6px 12px; font-size: 13px; }
.info-label { font-size: 11px; color: #888; }
.info-value { font-size: 14px; font-weight: 600; color: #333; }

body { background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 50%, #a5d6a7 100%); min-height: 100vh; }
.header { background: #2e7d32; }
</style>
</head><body>
<div class="header">
  <h1>🌱 Tania — Farm Management</h1>
  <div><span class="farm-badge">OSS Agricultural Software</span></div>
</div>

<div style="display:flex;justify-content:center;align-items:center;min-height:80vh;">
  <div style="background:white;border-radius:16px;padding:48px;box-shadow:0 4px 24px rgba(0,0,0,0.12);width:400px;text-align:center;">
    <div style="font-size:48px;margin-bottom:16px;">🌱</div>
    <h2 style="color:#2e7d32;font-size:24px;margin-bottom:8px;">Tania</h2>
    <p style="color:#888;font-size:14px;margin-bottom:32px;">Open Source Farm Management</p>
    <div style="text-align:left;margin-bottom:16px;">
      <label style="font-size:12px;color:#888;display:block;margin-bottom:4px;">Username</label>
      <input type="text" value="tania" style="width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:14px;background:#f9f9f9;">
    </div>
    <div style="text-align:left;margin-bottom:24px;">
      <label style="font-size:12px;color:#888;display:block;margin-bottom:4px;">Password</label>
      <input type="password" value="••••••" style="width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:14px;background:#f9f9f9;">
    </div>
    <button style="width:100%;background:#2e7d32;color:white;border:none;padding:12px;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;">Sign In</button>
    <p style="margin-top:16px;font-size:12px;color:#aaa;">Demo: tania / tania</p>
  </div>
</div>
</body></html>
