<title>デモ：地域EC・CSA 栽培〜出荷 一元管理（イメージ）</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root{ --paper:#f6f2ea; --surface:#fffdf8; --ink:#1f261d; --muted:#6f685b; --line:#e4dccd;
    --forest:#2f5d4f; --forest-deep:#244b40; --clay:#bf6438;
    --display:"Shippori Mincho",serif; --body:"Zen Kaku Gothic New",system-ui,"Noto Sans JP",sans-serif; }
  *{box-sizing:border-box;}
  body{ margin:0; border-top:4px solid; border-image:linear-gradient(90deg,var(--forest-deep),var(--clay)) 1;
    font-family:var(--body); color:var(--ink); background:var(--paper); line-height:1.7;
    background-image:radial-gradient(820px 480px at 90% -8%,rgba(191,100,56,.08),transparent 60%),radial-gradient(760px 480px at -6% 6%,rgba(47,93,79,.10),transparent 55%);
    -webkit-font-smoothing:antialiased; }
  .wrap{ max-width:980px; margin:0 auto; padding:36px 22px 70px; }
  a.back{ color:var(--forest-deep); font-size:13px; font-weight:700; text-decoration:none; letter-spacing:.04em; }
  a.back:hover{ text-decoration:underline; }
  .kick{ font-size:12px; letter-spacing:.4em; text-transform:uppercase; color:var(--clay); font-weight:700; margin:18px 0 8px; }
  h1{ font-family:var(--display); font-weight:700; color:var(--forest-deep); font-size:clamp(26px,5vw,38px); line-height:1.25; margin:0 0 14px; }
  .note{ background:#fbf7ef; border:1px solid #ece2cd; border-radius:12px; padding:14px 18px; color:var(--ink); font-size:14px; margin:14px 0 34px; }
  .note b{ color:var(--clay); }
  figure{ margin:0 0 38px; }
  .cap{ display:flex; gap:12px; align-items:baseline; margin-bottom:10px; }
  .cap .num{ font-family:var(--display); font-weight:700; color:var(--clay); font-size:18px; }
  .cap h2{ font-family:var(--display); font-weight:600; font-size:19px; margin:0; color:var(--ink); }
  .cap .d{ color:var(--muted); font-size:13.5px; }
  img{ width:100%; height:auto; display:block; border:1px solid var(--line); border-radius:12px;
    box-shadow:0 1px 2px rgba(31,38,29,.05),0 20px 44px -24px rgba(31,38,29,.4); background:#fff; }
  footer{ border-top:1px solid var(--line); padding-top:22px; color:var(--muted); font-size:12.5px; }
</style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="../../index.html#agri-tania-platform">← 解の棚にもどる</a>
    <p class="kick">Demo / イメージ</p>
    <h1>地域EC・CSA 栽培〜出荷 まるごと一元管理</h1>
    <div class="note">
      <b>※ これはイメージ画面です。</b>実績ある農業管理OSS「tania」を実際に動かし、サンプル農場のデータを入れて
      主要画面を作成したものです。実際の導入では、御社の運用（出荷・受注の流れ）に合わせて設定します。
    </div>

    <figure><div class="cap"><span class="num">01</span><h2>ダッシュボード</h2><span class="d">農場全体が1画面（圃場数・栽培バッチ・タスク・今週の収穫）</span></div><img src="01-dashboard.png" alt="ダッシュボード" loading="lazy" /></figure>
    <figure><div class="cap"><span class="num">02</span><h2>圃場・エリア管理</h2><span class="d">露地・ハウス・苗床を面積や水源つきで構造的に登録</span></div><img src="02-farm-areas.png" alt="圃場・エリア管理" loading="lazy" /></figure>
    <figure><div class="cap"><span class="num">03</span><h2>作物・栽培バッチ</h2><span class="d">なす・トマト・きゅうりを品目×圃場×進捗で管理</span></div><img src="03-crops.png" alt="作物・栽培バッチ" loading="lazy" /></figure>
    <figure><div class="cap"><span class="num">04</span><h2>作業記録・タスク</h2><span class="d">水やり・施肥・防除・収穫を期日と優先度で。今日やることが一目で</span></div><img src="04-tasks.png" alt="作業記録・タスク" loading="lazy" /></figure>
    <figure><div class="cap"><span class="num">05</span><h2>在庫（種苗・資材）</h2><span class="d">種・苗・堆肥などを単価つきで記録</span></div><img src="05-inventory.png" alt="在庫" loading="lazy" /></figure>
    <figure><div class="cap"><span class="num">06</span><h2>収穫記録</h2><span class="d">品目別の収量を記録し、出荷データへつなぐイメージ</span></div><img src="06-harvest.png" alt="収穫記録" loading="lazy" /></figure>
    <figure><div class="cap"><span class="num">00</span><h2>ログイン</h2><span class="d">シンプルに始められる</span></div><img src="00-login.png" alt="ログイン" loading="lazy" /></figure>

    <footer>解の棚 — 業務改善・AI導入支援。ベース：tania（オープンソースの農業管理ソフト）。</footer>
  </div>
</body>
</html>
